version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: safevoice
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safevoice_dev}
      POSTGRES_DB: safevoice
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safevoice"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://safevoice:${POSTGRES_PASSWORD:-safevoice_dev}@db:5432/safevoice
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-60}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
