<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeVoice · Tutor-Prep Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:  #13131c;
      --surface-2: #1a1a24;
      --border:   #262632;
      --border-hi: #3a3a48;
      --text:     #edeef2;
      --dim:      #a0a0ae;
      --mute:     #55556a;
      --gold:     #d4ac6b;
      --green:    #4ade80;
      --red:      #ef4444;
      --blue:     #60a5fa;
      --font:     "Inter", system-ui, -apple-system, sans-serif;
      --serif:    "Fraunces", "New York", Georgia, serif;
      --mono:     "JetBrains Mono", ui-monospace, "SF Mono", monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
      padding: 40px 20px 100px;
    }
    .wrap { max-width: 740px; margin: 0 auto; }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    h1 {
      margin: 0 0 8px;
      font-family: var(--serif);
      font-weight: 300;
      font-size: 36px;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--dim);
      font-size: 14px;
    }

    /* Progress */
    .progress-shell {
      margin: 28px 0;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--gold);
      width: 0;
      transition: width 400ms ease;
    }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--mute);
      letter-spacing: 0.08em;
      margin-top: 8px;
    }
    .progress-meta strong { color: var(--gold); font-weight: 600; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 32px 28px;
      animation: fade 280ms ease;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    .topic {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .q {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.35;
      margin-bottom: 24px;
    }
    .q code {
      font-family: var(--mono);
      font-size: 0.88em;
      padding: 2px 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--gold);
    }

    /* Options */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: 160ms ease;
      font-size: 14.5px;
      line-height: 1.5;
    }
    .opt:hover { border-color: var(--border-hi); background: #202030; }
    .opt.selected {
      border-color: var(--gold);
      background: rgba(212,172,107,0.06);
    }
    .opt.correct {
      border-color: var(--green);
      background: rgba(74,222,128,0.07);
    }
    .opt.wrong {
      border-color: var(--red);
      background: rgba(239,68,68,0.06);
    }
    .opt .letter {
      flex: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--border-hi);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--dim);
    }
    .opt.selected .letter { border-color: var(--gold); color: var(--gold); }
    .opt.correct .letter { border-color: var(--green); color: var(--green); }
    .opt.wrong .letter { border-color: var(--red); color: var(--red); }

    /* Open-ended */
    textarea {
      width: 100%;
      min-height: 100px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 14px 16px;
      font-family: var(--font);
      font-size: 14.5px;
      line-height: 1.55;
      resize: vertical;
      transition: border-color 160ms ease;
    }
    textarea:focus {
      outline: none;
      border-color: var(--gold);
    }

    /* Feedback */
    .feedback {
      margin-top: 20px;
      padding: 16px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      font-size: 14px;
      line-height: 1.6;
      display: none;
    }
    .feedback.show { display: block; animation: fade 200ms; }
    .feedback.correct { border-color: var(--green); background: rgba(74,222,128,0.04); }
    .feedback.wrong { border-color: var(--red); background: rgba(239,68,68,0.04); }
    .feedback .verdict {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .feedback.correct .verdict { color: var(--green); }
    .feedback.wrong .verdict { color: var(--red); }
    .feedback .model {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--border);
      color: var(--dim);
      font-size: 13px;
    }
    .feedback .model strong { color: var(--text); font-weight: 600; }
    .feedback code {
      font-family: var(--mono);
      font-size: 12px;
      padding: 1px 5px;
      background: var(--bg);
      border-radius: 4px;
      color: var(--gold);
    }

    /* Actions */
    .actions {
      margin-top: 24px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .btn {
      padding: 12px 22px;
      border-radius: 8px;
      border: 1px solid var(--border-hi);
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: 180ms ease;
    }
    .btn:hover { border-color: var(--gold); color: var(--gold); }
    .btn-primary {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--bg);
    }
    .btn-primary:hover {
      background: #ffdb9a;
      color: var(--bg);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Final screen */
    .final {
      text-align: center;
      padding: 48px 24px;
    }
    .score {
      font-family: var(--serif);
      font-size: 96px;
      font-weight: 300;
      color: var(--gold);
      line-height: 1;
      letter-spacing: -0.04em;
      margin: 20px 0;
    }
    .verdict-final {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .score-note { color: var(--dim); font-size: 14px; margin-bottom: 30px; }
    .missed {
      margin-top: 28px;
      text-align: left;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
    }
    .missed h3 {
      margin: 0 0 14px;
      font-size: 13px;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      font-weight: 700;
    }
    .missed ul { margin: 0; padding-left: 20px; }
    .missed li { margin-bottom: 8px; font-size: 13.5px; color: var(--dim); }
    .missed strong { color: var(--text); font-weight: 600; }

    footer {
      text-align: center;
      margin-top: 40px;
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.18em;
      color: var(--mute);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Tutor-prep quiz</h1>
      <div class="sub">20 questions · six topics · no time limit</div>
    </header>

    <div class="progress-shell"><div class="progress-bar" id="bar"></div></div>
    <div class="progress-meta">
      <span><strong id="qnum">1</strong> of <strong id="qtotal">20</strong></span>
      <span id="topic-label">DATABASE · USER vs AI</span>
      <span>score <strong id="score">0</strong></span>
    </div>

    <main id="stage"></main>

    <footer>Close when ready.</footer>
  </div>

  <script>
    // ═════════════════════════════════════════════════════════════
    // Questions — 20 total, organized by topic
    // MC  = multiple choice       (type: "mc", correct index)
    // OE  = open-ended reveal     (type: "oe", model answer)
    // ═════════════════════════════════════════════════════════════
    const QUESTIONS = [
      // ─── TOPIC 1 · Database & attributes (4) ─────────────────
      {
        topic: "Database · user vs AI",
        type: "mc",
        q: "Which field on the <code>classifications</code> table is AI-populated (not user input)?",
        options: [
          "email",
          "severity",
          "user_id",
          "victim_context",
        ],
        correct: 1,
        note: "Users provide email, language, content, and optional victim_context. The system generates IDs and timestamps. The AI populates severity, categories, laws, summaries, and consequences.",
      },
      {
        topic: "Database · relationships",
        type: "mc",
        q: "Why are <code>categories</code> and <code>laws</code> stored in separate tables with junction tables, instead of comma-separated strings on <code>classifications</code>?",
        options: [
          "SQLAlchemy doesn't support arrays in SQLite.",
          "Because one classification can map to many categories and many laws, and \"show me all cases citing § 241 StGB\" needs a JOIN, not a regex.",
          "Because categories are AI-populated and laws are user-input.",
          "Because Postgres is faster with junction tables.",
        ],
        correct: 1,
        note: "A comment can be misogyny AND a threat, triggering § 185 AND § 241 StGB. Many-to-many is the correct shape. Normalising also lets us seed reference data once and reuse IDs — a free-text string can't be queried reliably.",
      },
      {
        topic: "Database · hash chain",
        type: "mc",
        q: "What does the <code>hash_chain_previous</code> field on <code>evidence_items</code> enable?",
        options: [
          "Faster retrieval of prior evidence.",
          "Tamper-proof evidence — if any past item is edited, the chain breaks and a verifier can detect it.",
          "A backup in case content_hash is corrupted.",
          "A way to reconstruct evidence after cascaded deletion.",
        ],
        correct: 1,
        note: "Each evidence item stores its own SHA-256 AND the hash of the previous item in the user's chain. Edit any past record and the chain breaks immediately — a prosecutor or defense lawyer can verify chain integrity in seconds. Without this, the defense could argue 'the victim may have edited the comment before exporting' — with it, you have cryptographic proof.",
      },
      {
        topic: "Database · persistence",
        type: "mc",
        q: "How does the database survive a server restart in production?",
        options: [
          "In-memory Pydantic models serialise to JSON on shutdown.",
          "SQLAlchemy ORM + Alembic migrations persist to Postgres on Railway.",
          "The frontend localStorage syncs to disk.",
          "A cron job dumps state every hour.",
        ],
        correct: 1,
        note: "Real SQLAlchemy + Alembic migrations. SQLite for local dev (file: safevoice.db). Postgres on Railway in production, connected via DATABASE_URL. Migrations auto-run at container start; categories + laws are seeded via seed_categories_and_laws() on first boot.",
      },

      // ─── TOPIC 2 · User Auth (4) ─────────────────────────────
      {
        topic: "User auth · magic link",
        type: "mc",
        q: "Why magic-link auth and NOT passwords?",
        options: [
          "Magic links are trendier.",
          "German law requires 2FA for legal-tech systems.",
          "Victims under stress forget passwords; a password DB we don't have cannot leak; tokens are single-use and phishing-resistant.",
          "Magic links are cheaper to implement.",
        ],
        correct: 2,
        note: "Three reasons — all victim-centred. Victims under stress forget passwords. No password database means no breach risk. Tokens are single-use with 15-min expiry, which is stronger against phishing than any reusable password.",
      },
      {
        topic: "User auth · endpoints",
        type: "mc",
        q: "Which of these is NOT a real auth endpoint in SafeVoice?",
        options: [
          "POST /auth/login",
          "DELETE /auth/me/emergency",
          "POST /auth/verify",
          "POST /auth/reset-password",
        ],
        correct: 3,
        note: "No password reset because no passwords. The 8 real endpoints: POST /login, POST /verify, GET/PUT/DELETE /me, DELETE /me/emergency, POST /logout, GET /me/export.",
      },
      {
        topic: "User auth · GDPR",
        type: "mc",
        q: "What's the difference between <code>DELETE /auth/me</code> and <code>DELETE /auth/me/emergency</code>?",
        options: [
          "There is no difference; one is an alias.",
          "Soft delete sets <code>deleted_at</code> with a 7-day recovery window. Emergency does immediate hard delete — for victims under threat (perpetrator has device access).",
          "Soft delete removes only the user; emergency also removes their cases.",
          "Emergency requires admin approval; soft delete doesn't.",
        ],
        correct: 1,
        note: "Soft delete is the default — 7-day recovery window, GDPR Art. 17 grace period. Emergency is the Safe-Exit pattern: for victims whose perpetrator has access to their device. Immediate, no recovery, no forensic trace.",
      },
      {
        topic: "User auth · sessions",
        type: "mc",
        q: "A client sends <code>GET /auth/me</code> with <code>Authorization: Bearer &lt;token&gt;</code>. How does the server identify the user?",
        options: [
          "Decodes a JWT and trusts the payload.",
          "The <code>current_user</code> dependency extracts the token, looks it up in the sessions table, checks <code>expires_at</code>, returns the User ORM object — else 401.",
          "Reads a cookie and calls OpenAI to verify identity.",
          "Matches the token against a Redis cache.",
        ],
        correct: 1,
        note: "The current_user FastAPI dependency is the gate. It strips 'Bearer ', queries the sessions table for that token, checks expires_at is in the future, returns the linked User. If any step fails → 401 Unauthorized. Session tokens are 256-bit random strings (not JWTs), stored in the DB, 30-day lifetime, revocable by deleting the row.",
      },

      // ─── TOPIC 3 · Case + endpoints (3) ──────────────────────
      {
        topic: "Endpoints · text vs ingest",
        type: "mc",
        q: "What does <code>POST /analyze/ingest</code> do that <code>POST /analyze/text</code> does NOT?",
        options: [
          "Use a different LLM model.",
          "Create an evidence_item + a classification + a case in one database transaction.",
          "Return a PDF report.",
          "Scrape the URL before classifying.",
        ],
        correct: 1,
        note: "/analyze/text is the stateless testing endpoint — classify, return JSON, nothing saved. /analyze/ingest is the real flow — classifies AND writes evidence_item + classification + case to the DB in one transaction, with SHA-256 hash and UTC timestamp. /analyze/url scrapes a URL first, then goes through ingest.",
      },
      {
        topic: "Endpoints · ingest flow",
        type: "mc",
        q: "Inside <code>/analyze/ingest</code>, in what order are the three entities created?",
        options: [
          "case → classification → evidence_item",
          "evidence_item (hashed + timestamped) → classify → case created from classification result",
          "classification → evidence_item → case",
          "All three in parallel async tasks.",
        ],
        correct: 1,
        note: "The sequence matters legally. (1) Evidence is created first — hashed, timestamped, chained to the previous evidence. (2) Classification runs on the raw content. (3) The case is created FROM the classification result — title + severity come from the classifier's output. Only then is evidence.case_id set. One commit at the end.",
      },
      {
        topic: "Endpoints · hash order",
        type: "mc",
        q: "Why is the content SHA-256 hashed BEFORE the classifier runs, not after?",
        options: [
          "Hashing is faster on cold content.",
          "So the hash covers exactly what entered the system — not what the classifier returned or modified.",
          "The classifier mutates the content, so post-hash would be wrong.",
          "It's a pure logging convention, no semantic meaning.",
        ],
        correct: 1,
        note: "The hash is the evidence's fingerprint at capture time. If we hashed after classification, a defense lawyer could argue the hash covers a modified version. Hash-before-classify guarantees the content_hash proves the exact string the user submitted — regardless of what the LLM later says about it.",
      },

      // ─── TOPIC 4 · AI flow · input, context, prompt (3) ──────
      {
        topic: "AI flow · input",
        type: "mc",
        q: "What is the single INPUT format that reaches the classifier, regardless of how the user submitted content?",
        options: [
          "A Pydantic model with text, image, and url fields.",
          "Always a string.",
          "JSON with metadata wrapping the content.",
          "A tuple of (text, source, user_id).",
        ],
        correct: 1,
        note: "Always a string. Text-paste stays text. URL scrape extracts text. Screenshot OCR extracts text. By the time classify() is called, one code path, one input type. This is why we can test the classifier against a plain string without mocking three different input types.",
      },
      {
        topic: "AI flow · context",
        type: "mc",
        q: "Where does the AI flow's \"context\" live?",
        options: [
          "In a separate <code>context=</code> parameter on the OpenAI API call.",
          "In the system prompt — role, severity scale, category + law enums, the 'err on the side of the victim' rule.",
          "In a vector database queried per request (RAG).",
          "In a fine-tuned model.",
        ],
        correct: 1,
        note: "The system prompt IS the context. Role, severity definitions, category enum, law enum, the ethical rule — all in one constant. No RAG at the classification layer (context is stable, not retrieved). RAG appears at the case-level analysis in services/legal_ai.py.",
      },
      {
        topic: "AI flow · invariant",
        type: "mc",
        q: "Which law is the system prompt instructed to ALWAYS include in the classification, regardless of content?",
        options: [
          "§ 185 StGB (Insult)",
          "§ 241 StGB (Threat)",
          "NetzDG § 3 (Platform removal obligation)",
          "§ 130 StGB (Incitement to hatred)",
        ],
        correct: 2,
        note: "NetzDG § 3 applies to ALL social-media content by law — it's the platform-removal obligation. The system prompt hard-codes this invariant so the model can't forget it. Code also enforces it: in _to_domain(), if NetzDG isn't in the returned laws list, we append it.",
      },

      // ─── TOPIC 5 · Classification (3) ────────────────────────
      {
        topic: "Classification · temperature",
        type: "mc",
        q: "Why <code>temperature=0</code> on the classifier call?",
        options: [
          "It's cheaper per token.",
          "Legal classification must be deterministic — same input → same output — for trust and court-admissibility.",
          "Higher temperatures don't support JSON schema.",
          "OpenAI's terms require 0 for legal content.",
        ],
        correct: 1,
        note: "Deterministic classification is a legal + trust requirement. The same content on Monday and Wednesday must produce the same verdict, or we lose reproducibility. We give up creativity, we gain auditability. Classification is a mapping task, not a generative one.",
      },
      {
        topic: "Classification · model",
        type: "mc",
        q: "Why <code>gpt-4o-mini</code> instead of <code>gpt-4o</code>?",
        options: [
          "gpt-4o doesn't support German.",
          "~15× cheaper, with classification accuracy within about 90% of gpt-4o on this task — not a reasoning task where the larger model meaningfully outperforms.",
          "gpt-4o doesn't work for EU users.",
          "gpt-4o-mini is the only model with Structured Outputs support.",
        ],
        correct: 1,
        note: "Classification is not a reasoning task where gpt-4o's extra capacity pays off — it's a mapping from text to a closed set of labels. Mini is roughly 15× cheaper and performs within about 90% of gpt-4o on classification benchmarks. For a free-for-victims tool with viral cost risk, mini is the right trade-off.",
      },
      {
        topic: "Classification · failure mode",
        type: "mc",
        q: "What happens if OpenAI returns an error or refuses to classify?",
        options: [
          "A regex fallback tier takes over automatically.",
          "<code>classify()</code> raises <code>ClassifierUnavailableError</code>; the router returns <code>503 Service Unavailable</code>. No silent fallback.",
          "The evidence is saved with severity=unknown and the user is asked to retry.",
          "The request retries up to 5 times before failing.",
        ],
        correct: 1,
        note: "No fallback by design. A weak classification (e.g. a regex marking a death threat as medium § 185) is WORSE than no classification — it gives victims false confidence and misrepresents the case's seriousness. An honest 503 is safer than a misleading verdict. This is why the old 3-tier fallback was removed on 13 April 2026.",
      },

      // ─── TOPIC 6 · Structured Outputs (3) ────────────────────
      {
        topic: "Structured Outputs · .parse()",
        type: "mc",
        q: "What does <code>client.chat.completions.parse()</code> give you that <code>.create()</code> did not?",
        options: [
          "Lower latency per request.",
          "Server-side schema validation — invalid outputs refused before you see them; returns a typed Pydantic instance.",
          "Automatic retries on rate-limits.",
          "Vision (image input) support.",
        ],
        correct: 1,
        note: "The big win. OpenAI validates the response against your Pydantic schema server-side. If the model tries to return an invalid severity or unknown category, the call is refused upstream. You get a typed Pydantic instance back, or None. No more defensive try/except on json.loads, no more markdown-fence stripping, no more retry loops.",
      },
      {
        topic: "Structured Outputs · refusal",
        type: "mc",
        q: "When <code>.parse()</code> returns, which two properties on the message must you check?",
        options: [
          "<code>msg.status</code> and <code>msg.code</code>",
          "<code>msg.refusal</code> and <code>msg.parsed</code>",
          "<code>msg.content</code> and <code>msg.role</code>",
          "<code>msg.finish_reason</code> and <code>msg.usage</code>",
        ],
        correct: 1,
        note: "Two failure modes, both explicit: (1) msg.refusal is set if OpenAI declined on safety grounds — rare but real. (2) msg.parsed is None if the model failed to produce a schema-valid output. Either → return None → router returns 503. No exceptions hidden, no malformed JSON bubbling up.",
      },
      {
        topic: "Structured Outputs · enums",
        type: "mc",
        q: "Why are <code>LLMCategory</code> and <code>LLMLaw</code> defined as string <code>Enum</code>s rather than plain <code>list[str]</code>?",
        options: [
          "Enums serialise faster over JSON.",
          "The model cannot return a category or law outside the enum members — OpenAI refuses schema-invalid responses server-side, so hallucinated values are impossible.",
          "Pydantic only works with Enum for string fields.",
          "It makes type hints easier to read.",
        ],
        correct: 1,
        note: "With plain str, the model could invent 'hate-speech-ish-maybe' and Pydantic would accept it. With exhaustive Enums (all 15 categories, all 11 laws), OpenAI's server-side enforcement rejects any response that contains an unknown value — the call fails before your code sees anything. Combined with model_config = ConfigDict(extra='forbid'), the schema is airtight.",
      },
    ];

    // ═════════════════════════════════════════════════════════════
    // State + rendering
    // ═════════════════════════════════════════════════════════════
    const stage = document.getElementById("stage");
    const bar = document.getElementById("bar");
    const qNumEl = document.getElementById("qnum");
    const qTotalEl = document.getElementById("qtotal");
    const scoreEl = document.getElementById("score");
    const topicLabel = document.getElementById("topic-label");

    qTotalEl.textContent = QUESTIONS.length;

    let index = 0;
    let score = 0;
    const missed = [];

    function updateProgress() {
      bar.style.width = `${(index / QUESTIONS.length) * 100}%`;
      qNumEl.textContent = Math.min(index + 1, QUESTIONS.length);
      scoreEl.textContent = score;
      if (QUESTIONS[index]) topicLabel.textContent = QUESTIONS[index].topic.toUpperCase();
    }

    function render() {
      if (index >= QUESTIONS.length) { renderFinal(); return; }
      const q = QUESTIONS[index];
      updateProgress();

      if (q.type === "mc") renderMC(q);
      else if (q.type === "oe") renderOE(q);
    }

    function renderMC(q) {
      const letters = ["A", "B", "C", "D"];
      let selected = null;

      stage.innerHTML = `
        <div class="card">
          <div class="topic">${q.topic}</div>
          <div class="q">${q.q}</div>
          <div class="options">
            ${q.options.map((o, i) => `
              <div class="opt" data-i="${i}">
                <div class="letter">${letters[i]}</div>
                <div>${o}</div>
              </div>
            `).join("")}
          </div>
          <div class="feedback" id="feedback"></div>
          <div class="actions">
            <button class="btn btn-primary" id="check" disabled>Check</button>
          </div>
        </div>
      `;

      const opts = stage.querySelectorAll(".opt");
      const check = document.getElementById("check");
      opts.forEach((opt) => {
        opt.addEventListener("click", () => {
          if (check.disabled === false && check.dataset.checked === "1") return;
          opts.forEach((o) => o.classList.remove("selected"));
          opt.classList.add("selected");
          selected = +opt.dataset.i;
          check.disabled = false;
        });
      });

      check.addEventListener("click", () => {
        if (check.dataset.checked === "1") {
          // proceed
          index++;
          render();
          return;
        }
        const correct = selected === q.correct;
        const fb = document.getElementById("feedback");
        opts.forEach((o) => {
          const i = +o.dataset.i;
          if (i === q.correct) o.classList.add("correct");
          if (i === selected && !correct) o.classList.add("wrong");
          o.style.pointerEvents = "none";
        });
        fb.className = `feedback show ${correct ? "correct" : "wrong"}`;
        fb.innerHTML = `
          <div class="verdict">${correct ? "Correct" : "Not quite"}</div>
          <div>${q.note}</div>
        `;
        if (correct) score++;
        else missed.push({ topic: q.topic, q: q.q, note: q.note });
        check.textContent = "Continue →";
        check.dataset.checked = "1";
        updateProgress();
      });
    }

    function renderOE(q) {
      stage.innerHTML = `
        <div class="card">
          <div class="topic">${q.topic} · open-ended</div>
          <div class="q">${q.q}</div>
          <textarea id="answer" placeholder="Type the answer in your own words. Click Reveal to compare with the model answer. This question is self-graded."></textarea>
          <div class="feedback" id="feedback"></div>
          <div class="actions">
            <button class="btn" id="skip">Skip</button>
            <button class="btn btn-primary" id="reveal" disabled>Reveal</button>
          </div>
        </div>
      `;
      const answer = document.getElementById("answer");
      const reveal = document.getElementById("reveal");
      const skip = document.getElementById("skip");
      const fb = document.getElementById("feedback");

      answer.addEventListener("input", () => {
        reveal.disabled = answer.value.trim().length < 10;
      });

      function showReveal(userSaid) {
        answer.readOnly = true;
        fb.className = "feedback show";
        fb.innerHTML = `
          <div class="verdict">Model answer — grade yourself</div>
          <div>${q.model}</div>
          <div class="model">
            <strong>Your answer:</strong><br>
            <em>${userSaid || "(skipped)"}</em>
          </div>
        `;
        reveal.textContent = "I had it";
        reveal.disabled = false;
        reveal.dataset.revealed = "1";
        skip.textContent = "Need to study";
      }

      reveal.addEventListener("click", () => {
        if (reveal.dataset.revealed === "1") {
          score++;
          index++;
          render();
          return;
        }
        showReveal(answer.value.trim());
      });

      skip.addEventListener("click", () => {
        if (reveal.dataset.revealed === "1") {
          missed.push({ topic: q.topic, q: q.q, note: q.model });
          index++;
          render();
          return;
        }
        showReveal(answer.value.trim());
      });
    }

    function renderFinal() {
      updateProgress();
      bar.style.width = "100%";
      qNumEl.textContent = QUESTIONS.length;
      const pct = Math.round((score / QUESTIONS.length) * 100);
      let verdict;
      if (pct >= 90) verdict = "Tutor-ready.";
      else if (pct >= 75) verdict = "Review the missed topics before the meeting.";
      else if (pct >= 60) verdict = "Re-read the missed-topic sections in <code>MEETING_20_APR.md</code>, then retake.";
      else verdict = "Re-read <code>DEMO_EN.md</code> and <code>MEETING_20_APR.md</code>, then retake.";

      const missedHtml = missed.length
        ? `<div class="missed">
            <h3>Review before the meeting</h3>
            <ul>
              ${missed.map((m) => `<li><strong>${m.topic}:</strong> ${m.note}</li>`).join("")}
            </ul>
          </div>`
        : `<div class="missed"><h3>Nothing missed</h3><ul><li>Full sweep. Retake is optional.</li></ul></div>`;

      stage.innerHTML = `
        <div class="card final">
          <div class="topic">RESULT</div>
          <div class="score">${score}/${QUESTIONS.length}</div>
          <div class="verdict-final">${verdict}</div>
          <div class="score-note">${pct}% · missed ${QUESTIONS.length - score}</div>
          <div class="actions" style="justify-content:center">
            <button class="btn" onclick="location.reload()">Retake</button>
          </div>
          ${missedHtml}
        </div>
      `;
    }

    render();

    // Keyboard: Enter advances when a button is focusable
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const btn = document.getElementById("check") || document.getElementById("reveal");
        if (btn && !btn.disabled) btn.click();
      }
      if (e.key >= "1" && e.key <= "4") {
        const opt = document.querySelector(`.opt[data-i="${+e.key - 1}"]`);
        if (opt) opt.click();
      }
    });
  </script>
</body>
</html>
